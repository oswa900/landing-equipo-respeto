<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Background Shield -->
  <path d="M50 5 L85 15 L85 45 C85 70 50 95 50 95 C50 95 15 70 15 45 L15 15 Z" fill="#0A192F" stroke="#10B981" stroke-width="4" stroke-linejoin="round"/>
  
  <!-- Outer Knots (Simplified Intertwined Knots) -->
  <circle cx="50" cy="45" r="32" fill="none" stroke="#112240" stroke-width="2" stroke-dasharray="8 4"/>
  <circle cx="50" cy="45" r="36" fill="none" stroke="#10B981" stroke-width="1" opacity="0.5"/>
  
  <!-- Handshake Silhouette (Professionalism & Trust) -->
  <g fill="#10B981" transform="translate(30, 30) scale(0.8)">
    <!-- Arm left -->
    <path d="M0,15 L20,35 L30,25 L10,5 Z"/>
    <!-- Arm right -->
    <path d="M50,15 L30,35 L20,25 L40,5 Z"/>
    <!-- Hands clasp -->
    <path d="M25,20 C25,15 35,15 35,20 C35,25 25,25 25,20 Z" fill="#FFFFFF"/>
    <path d="M22,25 C20,20 30,20 30,25" stroke="#FFFFFF" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M28,29 C26,24 36,24 36,29" stroke="#FFFFFF" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Inner Protection Ring -->
  <circle cx="50" cy="45" r="22" fill="none" stroke="#CCD6F6" stroke-width="2" opacity="0.8"/>
  <path d="M43 45 L48 50 L58 38" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
